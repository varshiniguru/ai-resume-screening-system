<!DOCTYPE html>
<html>
<head>
    <title>Candidate Ranking</title>
</head>
<body>

    <h1>Candidate Ranking</h1>

    <table border="1" cellpadding="10">

        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>
        </tr>

        {% for candidate in candidates %}

        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ candidate.name }}</td>
            <td>{{ candidate.score }}%</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
