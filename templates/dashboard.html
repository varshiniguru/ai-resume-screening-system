<!DOCTYPE html>
<html>
<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        AI Resume Screening Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Total Resumes</h5>

                    <h2>25</h2>

                </div>

            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Selected Candidates</h5>

                    <h2>10</h2>

                </div>

            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Rejected Candidates</h5>

                    <h2>15</h2>

                </div>

            </div>
        </div>

    </div>

    <div class="mt-5">

        <h3>Candidate Ranking</h3>

        <table class="table table-bordered table-striped mt-3">

            <thead class="table-dark">

                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>Priya</td>
                    <td>91%</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Varshini</td>
                    <td>85%</td>
                </tr>

                <tr>
                    <td>3</td>
                    <td>Rahul</td>
                    <td>72%</td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
